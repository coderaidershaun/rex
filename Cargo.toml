[package]
name = "rex"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "rex"
path = "src/bin/main.rs"

[lib]
name = "rex"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dialoguer = "0.11"
console = "0.15"
inquire = "0.9.4"
crossterm = "0.29"
include_dir = "0.7"
